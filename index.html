<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self';">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Carb Cycle Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="app">
    <div id="page-content"></div>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-page="calendar">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Cycle</span>
      </button>
      <button class="nav-btn" data-page="meals">
        <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span>Meals</span>
      </button>
      <button class="nav-btn" data-page="workout">
        <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M2 12h4"/><path d="M18 12h4"/><rect x="6" y="4" width="2" height="16" rx="1"/><rect x="16" y="4" width="2" height="16" rx="1"/></svg>
        <span>Workout</span>
      </button>
      <button class="nav-btn" data-page="logger">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <span>Log</span>
      </button>
      <button class="nav-btn" data-page="dashboard">
        <svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        <span>Stats</span>
      </button>
    </nav>
  </div>

  <!-- Scripts loaded in order -->
  <script src="js/cycle.js"></script>
  <script src="js/db.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/meals.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
